    <style>
        /* Stylin kooban si liiska baraha bulshada u yeesho bilic qurxoon */
        .contact-list {
            list-style: none;
            padding: 0;
        }
        .contact-list li {
            margin: 15px 0;
            font-size: 18px;
        }
        .contact-list a {
            text-decoration: none;
            color: #333;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
        }
        /* Midabada rasmiga ah ee apps-ka marka jiirka (mouse) la mariyo */
        .contact-list .facebook:hover { color: #1877F2; }
        .contact-list .linkedin:hover { color: #0077B5; }
        .contact-list .whatsapp:hover { color: #25D366; }
        .contact-list .email:hover { color: #EA4335; }

        /* Qaybaha lagu daray si koodhka loogu dhigo responsive */
        header img {
            max-width: 100%;
            height: auto;
        }
        nav ul {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            padding: 0;
            gap: 15px;
        }
        nav ul li a img {
            max-width: 100%;
            height: auto;
        }
        main, footer, header {
            padding: 10px;
            text-align: center;
        }

        /* Habaynta shaashadaha yaryar (Mobilada) */
        @media (max-width: 600px) {
            header img {
                width: 120px; /* Logo-da oo yaraneysa marka moobil lagu jiro */
            }
            nav ul li a img {
                width: 60px; /* Badhamada menu-ka oo yaranya si ay u wada galaan safka */
            }
        }
    </style>
</head>
